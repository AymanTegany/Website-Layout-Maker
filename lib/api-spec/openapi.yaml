openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DTuin Faculty Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rooms
    description: Room operations
  - name: analytics
    description: Analytics and statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /rooms:
    get:
      operationId: getRooms
      tags: [rooms]
      summary: Get all rooms
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

  /rooms/{id}:
    get:
      operationId: getRoomById
      tags: [rooms]
      summary: Get room by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get overall analytics summary
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/occupancy:
    get:
      operationId: getOccupancyByRoom
      tags: [analytics]
      summary: Get occupancy data per room
      responses:
        "200":
          description: Occupancy data per room
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccupancyData"

  /analytics/energy:
    get:
      operationId: getEnergyTrend
      tags: [analytics]
      summary: Get energy consumption trend
      responses:
        "200":
          description: Energy trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnergyTrend"

  /analytics/temperature:
    get:
      operationId: getTemperatureDistribution
      tags: [analytics]
      summary: Get temperature distribution across rooms
      responses:
        "200":
          description: Temperature distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemperatureData"

  /analytics/alerts:
    get:
      operationId: getActiveAlerts
      tags: [analytics]
      summary: Get active alerts
      responses:
        "200":
          description: Active alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    Room:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        floor:
          type: integer
        area:
          type: number
        capacity:
          type: integer
        students:
          type: integer
        temperature:
          type: number
        energyUsage:
          type: number
        status:
          type: string
          enum: [Normal, Alert, Warning]
        occupancyRate:
          type: number
      required:
        - id
        - name
        - floor
        - area
        - capacity
        - students
        - temperature
        - energyUsage
        - status
        - occupancyRate

    AnalyticsSummary:
      type: object
      properties:
        totalRooms:
          type: integer
        totalStudents:
          type: integer
        energyUsage:
          type: number
        occupancyRate:
          type: number
        avgTemperature:
          type: number
        activeAlerts:
          type: integer
      required:
        - totalRooms
        - totalStudents
        - energyUsage
        - occupancyRate
        - avgTemperature
        - activeAlerts

    OccupancyData:
      type: object
      properties:
        room:
          type: string
        occupancy:
          type: integer
      required:
        - room
        - occupancy

    EnergyTrend:
      type: object
      properties:
        month:
          type: string
        energy:
          type: number
      required:
        - month
        - energy

    TemperatureData:
      type: object
      properties:
        room:
          type: integer
        floor:
          type: integer
        temperature:
          type: number
      required:
        - room
        - floor
        - temperature

    Alert:
      type: object
      properties:
        id:
          type: integer
        roomName:
          type: string
        type:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [red, yellow, green]
        timestamp:
          type: string
      required:
        - id
        - roomName
        - type
        - message
        - severity
        - timestamp
